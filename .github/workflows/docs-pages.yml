# 在仓库 Settings → Pages 中将 Source 设为「GitHub Actions」后生效。
# 默认站点 URL：https://<owner>.github.io/<repo>/
# 若使用自定义域名或根站点，可在仓库 Variables 中设置 PAGES_BASE_PATH（例如 "/"）

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 文档里的 Demo 会编译 ../src 下的 .vue；Vite 会解析根目录 tsconfig.json 的 extends，需要根目录 node_modules（@vue/tsconfig、element-plus 等）
      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install and build docs
        working-directory: docs
        env:
          # 未配置仓库 Variable PAGES_BASE_PATH 时，按 GitHub Pages 项目站点路径 /<repo>/
          VITE_BASE_PATH: ${{ vars.PAGES_BASE_PATH || format('/{0}/', github.event.repository.name) }}
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: SPA fallback for GitHub Pages
        run: cp docs/dist/index.html docs/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
